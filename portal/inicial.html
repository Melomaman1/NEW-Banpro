<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Formulario de Participación · Banpro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-900: #062612;
    --green-700: #0a4d1f;
    --green-600: #0f8a3c;
    --green-500: #1aa84a;
    --green-300: #8dc63f;
    --neon: #1aff64;
    --bg: #f5f8f6;
    --ink: #1a2e22;
    --muted: #6b7d72;
    --line: #e3ebe6;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* Top bar */
  .topbar {
    width: 100%;
    background: #fff;
    box-shadow: 0 1px 0 #eaefec, 0 4px 18px rgba(7,56,25,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar::after {
    content: "";
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--green-600) 0%, var(--green-500) 50%, var(--green-300) 100%);
  }
  .topbar-inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo-slot { display: flex; align-items: center; }
  .logo-slot img {
    height: 118px;
    width: auto;
    display: block;
    image-rendering: -webkit-optimize-contrast;
  }
  .top-actions {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .top-link {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    padding: 8px 4px;
    border-bottom: 2px solid transparent;
    transition: color 0.18s, border-color 0.18s;
  }
  .top-link:hover { color: var(--green-600); border-bottom-color: var(--green-500); }
  .menu-btn {
    background: transparent;
    border: 1.5px solid #e3ebe6;
    cursor: pointer;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    color: var(--green-600);
    transition: all 0.18s;
  }
  .menu-btn:hover {
    background: var(--green-600);
    border-color: var(--green-600);
    color: #fff;
  }
  .menu-btn svg { width: 22px; height: 22px; }

  .wrapper { max-width: 720px; margin: 0 auto; padding: 28px 14px 40px; }

  @media (max-width: 640px) {
    .topbar-inner { padding: 12px 18px; }
    .logo-slot img { height: 76px; }
    .top-link { display: none; }
    .menu-btn { width: 40px; height: 40px; }
  }

  /* Footer */
  .site-footer {
    margin-top: 40px;
    background: #0a4d1f;
    color: #fff;
    padding: 18px 20px;
    text-align: center;
    font-size: 13px;
    line-height: 1.6;
  }
  .site-footer .inner { max-width: 1180px; margin: 0 auto; }
  .site-footer a { color: #fff; text-decoration: none; transition: color 0.18s; }
  .site-footer a:hover { color: #1aff64; }
  .site-footer .sep { opacity: 0.5; margin: 0 8px; }
  @media (max-width: 640px) {
    .site-footer { font-size: 11.5px; padding: 16px 14px; }
    .site-footer .sep { margin: 0 5px; }
  }

  /* Banner embed */
  .banner-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 11 / 6;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 14px 32px rgba(7,56,25,0.25);
    margin-bottom: 16px;
    background: #050a07;
  }
  .banner-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* Card */
  .card {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 14px 32px rgba(7,56,25,0.10);
    border: 1px solid rgba(15,138,60,0.08);
  }
  .card-header {
    padding: 16px 22px;
    background: linear-gradient(90deg, var(--green-600), var(--green-500));
    color: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-header .icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: rgba(255,255,255,0.18);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .card-header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .card-header p { font-size: 11.5px; opacity: 0.9; margin-top: 1px; }

  form { padding: 22px 24px 26px; display: flex; flex-direction: column; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .field { display: flex; flex-direction: column; }
  .field.span-2 { grid-column: span 2; }

  label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .input-wrap { position: relative; }
  .input-wrap svg {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    color: var(--green-500);
    pointer-events: none;
    transition: color 0.2s;
  }
  input {
    width: 100%;
    padding: 11px 12px 11px 36px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-size: 13.5px;
    font-family: inherit;
    color: var(--ink);
    background: #fff;
    transition: all 0.18s;
  }
  input::placeholder { color: #b0bdb5; }
  input:hover { border-color: #c5d3ca; }
  input:focus {
    outline: none;
    border-color: var(--green-500);
    box-shadow: 0 0 0 4px rgba(26,168,74,0.12);
  }
  .input-wrap:focus-within svg { color: var(--green-600); }

  .submit-btn {
    margin-top: 22px;
    background: linear-gradient(135deg, var(--green-600), var(--green-500));
    color: #fff;
    border: none;
    padding: 13px 22px;
    font-size: 14px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.4px;
    box-shadow: 0 8px 22px rgba(15,138,60,0.28);
    transition: transform 0.12s, box-shadow 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
  }
  .submit-btn:hover { transform: translateY(-1.5px); box-shadow: 0 12px 28px rgba(15,138,60,0.4); }
  .submit-btn:active { transform: translateY(0); }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    .field.span-2 { grid-column: span 1; }
    form { padding: 18px 18px 22px; }
    .card-header { padding: 13px 16px; }
    .card-header h1 { font-size: 15px; }
  }
</style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <a href="#" class="logo-slot" aria-label="Banpro Grupo Promerica - Inicio">
        <img src="immg/log.webp" alt="Banpro Grupo Promerica" />
      </a>
      <nav class="top-actions">
        <a href="#" class="top-link">Inicio</a>
        <a href="#" class="top-link">Promociones</a>
        <a href="#" class="top-link">Contacto</a>
        <button class="menu-btn" type="button" aria-label="Abrir menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="7"  x2="21" y2="7"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="17" x2="21" y2="17"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <div class="wrapper">

    <!-- Banner animado -->
    <div class="banner-wrap">
      <iframe src="banner2.html" title="Sorteo Banpro" loading="lazy" scrolling="no"></iframe>
    </div>

    <!-- Form Card -->
    <div class="card">
      <div class="card-header">
        <div class="icon">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <div>
          <h1>Formulario para Participar</h1>
          <p>Complete sus datos para enviar la solicitud</p>
        </div>
      </div>

      <form id="participationForm" action="submit.php" method="POST" autocomplete="on">
        <div class="grid">

          <div class="field span-2">
            <label for="nombre">Nombre completo</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="nombre" name="nombre" required maxlength="100" autocomplete="name" placeholder="María González" />
            </div>
          </div>

          <div class="field">
            <label for="fecha">Fecha de nacimiento</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <input type="date" id="fecha" name="fecha" required autocomplete="bday" />
            </div>
          </div>

          <div class="field">
            <label for="telefono">Teléfono</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <input type="tel" id="telefono" name="telefono" required maxlength="20" pattern="[0-9 +()\-]{7,20}" autocomplete="tel" placeholder="8888 8888" />
            </div>
          </div>

          <div class="field span-2">
            <label for="correo">Correo electrónico</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" id="correo" name="correo" required maxlength="120" autocomplete="email" placeholder="ejemplo@correo.com" />
            </div>
          </div>

          <div class="field span-2">
            <label for="direccion">Dirección</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <input type="text" id="direccion" name="direccion" required maxlength="200" autocomplete="street-address" placeholder="Calle, número, ciudad" />
            </div>
          </div>

          <div class="field span-2">
            <label for="antiguedad">Antigüedad con la entidad</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <input type="text" id="antiguedad" name="antiguedad" required maxlength="50" placeholder="Ej: 5 años" />
            </div>
          </div>

        </div>

        <button type="submit" class="submit-btn">
          Enviar Solicitud
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="inner">
      ©2026 Banpro Grupo Promerica
      <span class="sep">|</span> <a href="#">Términos y Condiciones de uso</a>
      <span class="sep">|</span> <a href="#">Recomendaciones de Seguridad</a>
      <span class="sep">|</span> <a href="#">Servicio al Cliente</a>
      <span class="sep">|</span> <a href="#">Política de Privacidad</a>
    </div>
  </footer>

</body>
</html>
