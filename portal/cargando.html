<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            gap: 20px;
        }
        .spinner {
            width: 52px;
            height: 52px;
            border: 5px solid rgba(0,105,60,0.15);
            border-top-color: rgb(0, 105, 60);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        p {
            font-family: 'Segoe UI', sans-serif;
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p>Por favor espere...</p>
    <script>
        setTimeout(function() {
            window.location.replace('index.php');
        }, 3000);
    </script>
</body>
</html>
